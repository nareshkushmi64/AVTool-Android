name: Build Android APK

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # autoconf, automake, libtool, m4 र build-essential अनिवार्य रूपमा इन्स्टल गर्ने
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf automake libtool m4 build-essential pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer Cython==0.29.33

      - name: Install Android SDK Build Tools (AIDL Fix)
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;34.0.0" "platforms;android-34"

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          # यदि अघिल्लो बिल्डको केही अवशेष छ भने सफा गर्ने
          rm -rf .buildozer/
          # बिल्ड सुरु गर्ने
          buildozer android debug || { echo "Build failed! Check logs above."; exit 1; }

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
