name: Build Android APK

on:
  push:
    branches: [ "main" ]

env:
  # Node.js 24 को चेतावनी हटाउन र भविष्यको लागि सुरक्षित राख्न
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer Cython==0.29.33

      - name: Install Android SDK Build Tools (AIDL Fix)
        run: |
          # GitHub Runner मा AIDL सहितको Build Tools सेटअप गर्ने
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          # यदि .spec फाइल छैन भने एरर दिने
          if [ ! -f buildozer.spec ]; then
            echo "ERROR: buildozer.spec not found!"
            exit 1
          fi
          # एन्ड्रोइड डिबग APK बनाउने (यसले २०-३० मिनेट लिन सक्छ)
          buildozer android debug || { echo "Build failed! Check logs above."; exit 1; }

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
