name: Build Android APK

on:
  push:
    branches: [ "main" ]

env:
  # Node.js 24 को चेतावनी हटाउन र भविष्यको लागि सुरक्षित राख्न
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer
          pip3 install --user --upgrade Cython==0.29.33

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          # यदि फाइल छैन भने सुरु गर्छ, तर लगहरू देखाउँछ
          buildozer android debug || { echo "Build failed! Please check the logs above."; exit 1; }
