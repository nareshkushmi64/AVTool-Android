name: Build Android APK

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          # libtinfo5 को सट्टा libtinfo6 राखिएको छ
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer
          pip3 install --user --upgrade Cython==0.29.33

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          # buildozer.spec फाइल चेक गर्ने
          if [ ! -f buildozer.spec ]; then
            echo "ERROR: buildozer.spec file not found!"
            exit 1
          fi
          # पहिलो पटक बिल्ड गर्दा केही समय लाग्छ
          buildozer android debug || { echo "Build failed! Check the logs above."; exit 1; }
